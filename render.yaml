services:
  - type: web
    name: futbol-stats-pro
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-db
          property: connectionString

databases:
  - name: futbol-db
    plan: free
    databaseName: futbol_db
    user: postgres
